name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'dental-backend/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'dental-backend/**'

defaults:
  run:
    working-directory: dental-backend

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: dental-backend/package-lock.json

      - run: npm ci

      - run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

  test:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: dental-backend/package-lock.json

      - run: npm ci

      - run: npx prisma generate

      - name: Run tests
        run: npm test

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: dental-backend/package-lock.json

      - run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

  build:
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: dental-backend/package-lock.json

      - run: npm ci

      - run: npx prisma generate

      - name: Build
        run: npm run build

      - name: Build Docker image
        run: docker build -t dental-backend:${{ github.sha }} .
