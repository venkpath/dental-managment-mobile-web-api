name: Frontend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'dental-frontend/**'
  pull_request:
    branches: [main, develop]
    paths:
      - 'dental-frontend/**'

defaults:
  run:
    working-directory: dental-frontend

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: dental-frontend/package-lock.json

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

  test:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: dental-frontend/package-lock.json

      - run: npm ci

      - name: Run tests
        run: npm test

  build:
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: dental-frontend/package-lock.json

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Build Docker image
        run: docker build -t dental-frontend:${{ github.sha }} .
